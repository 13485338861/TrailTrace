name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Install Capacitor Android platform
        run: npm install @capacitor/android

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Build web app
        run: npm run build

      - name: Build Android APK
        if: runner.os == 'Linux'
        run: |
          rm -rf android
          yes | npx cap add android
          # Fix kotlin-stdlib duplicate class error after cap add overwrites build.gradle
          python -c "
import re
with open('android/build.gradle', 'r') as f:
    content = f.read()
patch = '''
configurations.all {
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
}
'''
content = re.sub(r'(apply from: .*variables.gradle.*\n)', r'\1' + patch, content)
with open('android/build.gradle', 'w') as f:
    f.write(content)
"
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
